l_english:
 TLK_871_NAME:0 "The Last Kingdom"
 TLK_871_DESC:0 "It is 871 AD. The Great Heathen Army has shattered the kingdoms of the North. Only Wessex stands. Alfred, youngest son of Aethelwolf, has just been crowned King - inheriting a kingdom besieged on all sides by Danish warlords hungry for land and glory. Can Alfred hold Wessex together and begin the long dream of a united England?"